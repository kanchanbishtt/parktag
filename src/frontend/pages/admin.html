<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ParkTag — Admin</title>
    <link rel="stylesheet" href="/styles/styles.css" />
  </head>
  <body class="pt-hub-body">

    <header class="pt-header">
      <div class="pt-logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="#F5A623"/>
          <path d="M8 8h7.5a4.5 4.5 0 0 1 0 9H11v5H8V8Z" fill="#fff"/>
          <circle cx="15" cy="12.5" r="1.5" fill="#F5A623"/>
        </svg>
        <span>ParkTag</span>
      </div>
      <span class="pt-header-badge" style="background:#FEE2E2;color:#991B1B">Admin</span>
    </header>

    <main class="pt-auth-main">
      <div class="pt-auth-card" style="max-width:440px">

        <div class="pt-card-icon" style="background:#FEF3C7;color:#D97706;margin-bottom:12px">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L4 6v6c0 5.25 3.5 9.74 8 11 4.5-1.26 8-5.75 8-11V6l-8-4Z" stroke="currentColor" stroke-width="2"/>
            <path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>

        <h1 class="pt-card-title">Admin access</h1>
        <p class="pt-card-sub" style="margin-bottom:20px">Sign in to manage tags, issuance batches, owners, and activity.</p>

        <div class="pt-form">
          <label class="pt-field">
            <span>Email address</span>
            <input id="admin-email" type="email" class="pt-input" placeholder="your@email.com" />
          </label>
          <label class="pt-field">
            <span>Password</span>
            <input id="admin-password" type="password" class="pt-input" placeholder="Your password" />
          </label>
          <button id="admin-login-button" class="pt-btn pt-btn-activate pt-btn-full" style="margin-top:4px">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Open dashboard
          </button>
        </div>

        <p id="admin-auth-status" class="pt-status" data-tone="info" style="text-align:center;padding-top:12px"></p>

      </div>
    </main>

    <script type="module" src="/scripts/admin.js"></script>
    <script src="/scripts/ux-feedback.js"></script>
  </body>
</html>
