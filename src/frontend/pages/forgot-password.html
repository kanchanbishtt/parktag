<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ParkTag — Forgot Password</title>
    <link rel="stylesheet" href="/styles/styles.css" />
  </head>
  <body class="pt-hub-body">

    <header class="pt-header">
      <div class="pt-logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="#F5A623"/>
          <path d="M8 8h7.5a4.5 4.5 0 0 1 0 9H11v5H8V8Z" fill="#fff"/>
          <circle cx="15" cy="12.5" r="1.5" fill="#F5A623"/>
        </svg>
        <span>ParkTag</span>
      </div>
    </header>

    <main class="pt-auth-main">
      <div class="pt-auth-card">
        <div class="pt-card-icon pt-icon-tag" style="margin-bottom:12px">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <h1 class="pt-card-title">Forgot your password?</h1>
        <p class="pt-card-sub" style="margin-bottom:20px">Enter the email address on your owner account and we'll send you a reset link.</p>

        <div id="forgot-form-shell">
          <div class="pt-form">
            <label class="pt-field">
              <span>Email address</span>
              <input id="forgot-email" type="email" class="pt-input" placeholder="name@example.com" />
            </label>
            <button id="forgot-submit" class="pt-btn pt-btn-primary pt-btn-full" style="margin-top:4px">Send reset link</button>
          </div>
        </div>

        <div id="forgot-success-shell" hidden>
          <div style="text-align:center;padding:16px 0">
            <div style="width:48px;height:48px;background:#ECFDF5;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <p style="font-weight:700;color:#111;margin-bottom:6px">Check your email</p>
            <p style="font-size:0.88rem;color:#6B7280;line-height:1.5">If an account exists with that address, a reset link has been sent. Check your inbox (and spam folder).</p>
          </div>
        </div>

        <p id="forgot-status" class="pt-status" data-tone="info" style="padding:12px 0 0;text-align:center"></p>
        <p style="text-align:center;font-size:0.85rem;color:#6B7280;margin-top:12px">
          <a href="/owner" style="color:#F5A623;font-weight:700">Back to sign in</a>
        </p>
      </div>
    </main>

    <script type="module" src="/scripts/forgot-password.js"></script>
    <script src="/scripts/ux-feedback.js"></script>
  </body>
</html>
