<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>ParkTag</title>
  <link rel="stylesheet" href="/styles/styles.css"/>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #fff; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }

    .pt-wp { width: 100%; min-height: 100vh; background: #fff; }

    /* ── Amber header ──────────────────────────────── */
    .pt-wh {
      background: linear-gradient(155deg, #F5A623 0%, #FFD580 55%, #fff9ed 100%);
      padding: 14px 18px 24px;
    }
    .pt-wh-inner { max-width: 880px; margin: 0 auto; }
    .pt-wh-top {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
    }
    .pt-wh-logo { display: flex; align-items: center; gap: 9px; }
    .pt-wh-logo-box {
      width: 36px; height: 36px; border-radius: 10px; background: #F5A623;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(245,166,35,0.35);
    }
    .pt-wh-logo-text { font-size: 1.35rem; font-weight: 900; color: #1a1200; letter-spacing: -0.02em; }
    .pt-wh-btns { display: flex; gap: 8px; }
    .pt-wh-btn {
      width: 40px; height: 40px; border-radius: 12px;
      background: rgba(255,255,255,0.6); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .pt-wh-btn:hover { background: rgba(255,255,255,0.85); }

    .pt-wh-bottom { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; }
    .pt-wh-hi   { font-size: 1.6rem; font-weight: 900; color: #1a1200; margin: 0 0 3px; }
    .pt-wh-id   { font-size: 0.83rem; color: #4a3000; margin: 0; opacity: .85; }
    .pt-manage-profile {
      display: flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,0.6); border-radius: 22px; padding: 8px 16px;
      font-size: 0.83rem; font-weight: 600; color: #1a1200;
      text-decoration: none; white-space: nowrap; flex-shrink: 0;
      backdrop-filter: blur(4px); transition: background .15s;
    }
    .pt-manage-profile:hover { background: rgba(255,255,255,0.85); }

    /* ── Content ───────────────────────────────────── */
    .pt-wc {
      max-width: 880px;
      margin: 0 auto;
      padding: 0 16px 56px;
    }

    /* ── Responsive breakpoints ────────────────────── */
    @media (min-width: 640px) {
      .pt-wh { padding: 16px 28px 28px; }
      .pt-wc { padding: 0 28px 56px; }
      .pt-vgrid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 1024px) {
      .pt-wh { padding: 20px 48px 32px; }
      .pt-wc { padding: 0 40px 64px; }
      .pt-vgrid { grid-template-columns: repeat(3, 1fr); }
    }

    /* ── Carousel ──────────────────────────────────── */
    .pt-car-wrap { padding: 16px 0 0; }
    .pt-car-vp {
      position: relative; overflow: hidden; border-radius: 18px;
      box-shadow: 0 3px 14px rgba(0,0,0,.09);
    }
    .pt-car-track { display: flex; transition: transform .38s cubic-bezier(.25,.46,.45,.94); }
    .pt-car-slide { min-width: 100%; }

    /* Slide image container */
    .pt-slide-img {
      width: 100%; aspect-ratio: 16/7; background: #F3F4F6;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    /* Placeholder */
    .pt-slide-ph {
      width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px;
    }
    .pt-slide-ph-tag {
      font-size: 0.72rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
      color: #9CA3AF; border: 1.5px dashed #D1D5DB; border-radius: 8px; padding: 5px 14px;
    }
    /* Mobile placeholder visible < 600px; desktop >= 600px */
    .pt-ph-mob  { display: flex; }
    .pt-ph-desk { display: none; }
    @media (min-width: 600px) {
      .pt-ph-mob  { display: none; }
      .pt-ph-desk { display: flex; }
    }

    /* Blank slides 2 & 3 */
    .pt-slide-blank {
      width: 100%; aspect-ratio: 16/7; background: #F9FAFB;
      border: 2px dashed #E5E7EB;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    }
    .pt-slide-blank-lbl { font-size: 0.78rem; font-weight: 600; color: #D1D5DB; margin: 0; }

    /* Dots */
    .pt-car-dots { display: flex; justify-content: center; gap: 7px; margin-top: 10px; }
    .pt-dot-btn {
      height: 7px; width: 7px; border-radius: 4px; background: #D1D5DB;
      border: none; cursor: pointer; padding: 0; transition: all .2s;
    }
    .pt-dot-btn[aria-selected="true"] { width: 22px; background: #F5A623; }

    /* Arrow buttons */
    .pt-car-arr {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,.88); border: 1.5px solid #E5E7EB;
      border-radius: 50%; width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 2; padding: 0; transition: box-shadow .15s;
    }
    .pt-car-arr:hover { box-shadow: 0 2px 8px rgba(0,0,0,.14); }
    .pt-car-prev { left: 8px; }
    .pt-car-next { right: 8px; }

    /* ── Search ────────────────────────────────────── */
    .pt-wsearch { display: flex; gap: 10px; align-items: center; padding: 16px 0 0; }
    .pt-wsearch-inp {
      flex: 1; height: 48px; border-radius: 24px;
      border: 1.5px solid #E5E7EB; background: #F9FAFB;
      padding: 0 18px; font-size: 0.88rem; color: #1F2937;
      outline: none; font-family: inherit; transition: border-color .15s;
    }
    .pt-wsearch-inp:focus { border-color: #F5A623; background: #fff; }
    .pt-wsearch-btn {
      width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0;
      background: #F5A623; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .pt-wsearch-btn:hover { background: #E59A1A; }

    /* ── Tags heading ──────────────────────────────── */
    .pt-tags-hd { padding: 22px 0 0; }
    .pt-tags-title { font-size: 1.3rem; font-weight: 900; color: #1a1200; margin: 0 0 5px; }
    .pt-tags-bar   { width: 34px; height: 3px; background: #F5A623; border-radius: 2px; margin-bottom: 7px; }
    .pt-tags-sub   { font-size: 0.88rem; color: #6B7280; margin: 0 0 16px; }

    /* ── Vehicle grid ──────────────────────────────── */
    .pt-vgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Vehicle card */
    .pt-vc {
      background: #fff; border-radius: 18px; border: 1.5px solid #E5E7EB;
      padding: 18px 12px 14px; display: flex; flex-direction: column;
      align-items: center; text-align: center; gap: 5px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
      transition: transform .15s, box-shadow .15s;
    }
    .pt-vc:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,.09); border-color: #F5A623; }
    .pt-vc-icon {
      width: 60px; height: 60px; border-radius: 50%; background: #EEF2FF;
      display: flex; align-items: center; justify-content: center;
      color: #4F46E5; position: relative; margin-bottom: 2px;
    }
    .pt-vc-badge {
      position: absolute; top: -3px; right: -3px;
      width: 20px; height: 20px; border-radius: 50%;
      background: #F5A623; color: #fff; border: 2px solid #fff;
      font-size: .62rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }
    .pt-vc-name  { font-weight: 800; font-size: .92rem; color: #1F2937; margin: 0;
                   max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pt-vc-plate { font-size: .73rem; color: #6B7280; font-weight: 600;
                   font-family: monospace; letter-spacing: .04em; margin: 0; }

    /* Add vehicle card */
    .pt-vadd {
      background: #FFFBF0; border-radius: 18px; border: 2px dashed #F5A623;
      padding: 18px 12px 14px; display: flex; flex-direction: column;
      align-items: center; text-align: center; gap: 5px;
      text-decoration: none; cursor: pointer; transition: background .15s;
    }
    .pt-vadd:hover { background: #FFF3DC; }
    .pt-vadd-icon {
      width: 60px; height: 60px; border-radius: 50%; background: #FFF3DC;
      border: 2px solid #1a1200;
      display: flex; align-items: center; justify-content: center;
      color: #1a1200; margin-bottom: 2px;
    }
    .pt-vadd-title { font-weight: 800; font-size: .92rem; color: #1F2937; margin: 0; }
    .pt-vadd-sub   { font-size: .73rem; color: #6B7280; margin: 0; line-height: 1.5; }
  </style>
</head>
<body>
<div class="pt-wp">

  <!-- ── Amber header ────────────────────── -->
  <div class="pt-wh">
   <div class="pt-wh-inner">
    <div class="pt-wh-top">
      <div class="pt-wh-logo">
        <div class="pt-wh-logo-box">
          <svg width="20" height="20" viewBox="0 0 28 28" fill="none">
            <path d="M6 6h9a5 5 0 0 1 0 10H10v6H6V6Z" fill="#ffffff"/>
            <circle cx="15" cy="11" r="2" fill="#F5A623"/>
          </svg>
        </div>
        <span class="pt-wh-logo-text">ParkTag</span>
      </div>
      <div class="pt-wh-btns">
        <button class="pt-wh-btn" aria-label="Notifications">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="#1a1200" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="#1a1200" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="pt-wh-btn" onclick="window.location.href='/owner'" aria-label="Profile">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="8" r="4" stroke="#1a1200" stroke-width="2"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="#1a1200" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="pt-wh-bottom">
      <div>
        <p class="pt-wh-hi" id="greetName">Hi, there!</p>
        <p class="pt-wh-id" id="greetId"></p>
      </div>
      <a href="/owner" class="pt-manage-profile">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Manage Profile
      </a>
    </div>
  </div><!-- /pt-wh-inner -->
  </div><!-- /pt-wh -->

  <!-- ── White content ───────────────────── -->
  <div class="pt-wc">

    <!-- Carousel -->
    <div class="pt-car-wrap">
      <div class="pt-car-vp" id="carVp">
        <div class="pt-car-track" id="carTrack">

          <!-- Slide 1 — image placeholders (mobile + desktop) -->
          <div class="pt-car-slide">
            <div class="pt-slide-img">
              <!-- Mobile image (< 600px) -->
              <div class="pt-slide-ph pt-ph-mob">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
                  <rect x="3" y="3" width="18" height="18" rx="2" stroke="#D1D5DB" stroke-width="1.5"/>
                  <circle cx="8.5" cy="8.5" r="1.5" fill="#D1D5DB"/>
                  <path d="M21 15l-5-5L5 21" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span class="pt-slide-ph-tag">Mobile Image — Slide 1</span>
              </div>
              <!-- Desktop image (≥ 600px) -->
              <div class="pt-slide-ph pt-ph-desk">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
                  <rect x="3" y="3" width="18" height="18" rx="2" stroke="#D1D5DB" stroke-width="1.5"/>
                  <circle cx="8.5" cy="8.5" r="1.5" fill="#D1D5DB"/>
                  <path d="M21 15l-5-5L5 21" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span class="pt-slide-ph-tag">Desktop Image — Slide 1</span>
              </div>
            </div>
          </div>

          <!-- Slide 2 — blank -->
          <div class="pt-car-slide">
            <div class="pt-slide-blank">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="3" width="18" height="18" rx="2" stroke="#D1D5DB" stroke-width="1.5"/>
                <circle cx="8.5" cy="8.5" r="1.5" fill="#D1D5DB"/>
                <path d="M21 15l-5-5L5 21" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              <p class="pt-slide-blank-lbl">Slide 2 — Coming Soon</p>
            </div>
          </div>

          <!-- Slide 3 — blank -->
          <div class="pt-car-slide">
            <div class="pt-slide-blank">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="3" width="18" height="18" rx="2" stroke="#D1D5DB" stroke-width="1.5"/>
                <circle cx="8.5" cy="8.5" r="1.5" fill="#D1D5DB"/>
                <path d="M21 15l-5-5L5 21" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              <p class="pt-slide-blank-lbl">Slide 3 — Coming Soon</p>
            </div>
          </div>

        </div>

        <button class="pt-car-arr pt-car-prev" id="carPrev" aria-label="Previous">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="#374151" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="pt-car-arr pt-car-next" id="carNext" aria-label="Next">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="#374151" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <div class="pt-car-dots">
        <button class="pt-dot-btn" aria-selected="true"  data-idx="0" aria-label="Slide 1"></button>
        <button class="pt-dot-btn" aria-selected="false" data-idx="1" aria-label="Slide 2"></button>
        <button class="pt-dot-btn" aria-selected="false" data-idx="2" aria-label="Slide 3"></button>
      </div>
    </div>

    <!-- Search -->
    <div class="pt-wsearch">
      <input class="pt-wsearch-inp" type="search" id="vehicleSearch" placeholder="Search ParkTag vehicle" autocomplete="off"/>
      <button class="pt-wsearch-btn" aria-label="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="8" stroke="#fff" stroke-width="2.2"/>
          <path d="M21 21l-4.35-4.35" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- Tags heading -->
    <div class="pt-tags-hd">
      <h2 class="pt-tags-title">Tags</h2>
      <div class="pt-tags-bar"></div>
      <p class="pt-tags-sub">Manage your ParkTag tags in one place.</p>
    </div>

    <!-- Vehicle grid -->
    <div class="pt-vgrid" id="vehicleGrid"></div>

  </div>
</div>

<script type="module" src="/scripts/owner-welcome.js"></script>
</body>
</html>
